spring:
  application:
    name: official-admin-api
  profiles:
    active: local
  jackson:
    time-zone: UTC
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

security:
  jwt:
    secret: ${JWT_SECRET:U3VwZXJTZWNyZXRLZXlGb3JPZmZpY2lhbEFkbWluQVBJU3VwZXI=}
    expiration-seconds: ${JWT_EXPIRE_SECONDS:7200}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
